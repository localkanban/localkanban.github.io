<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Local Kanban">
  <defs>
    <linearGradient id="task" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e8845f" />
      <stop offset="1" stop-color="#c96442" />
    </linearGradient>
    <linearGradient id="task-mid" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f09570" />
      <stop offset="1" stop-color="#c96442" />
    </linearGradient>
    <linearGradient id="task-deep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c96442" />
      <stop offset="1" stop-color="#a34d30" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="#1a1a1a" />

  <!-- Muted column shells: only wrap each stack (not full-height bars). Same top = tasks start from the top. -->
  <rect x="72" y="72" width="112" height="168" rx="22" fill="rgba(255,255,255,0.055)" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
  <rect x="200" y="72" width="112" height="288" rx="22" fill="rgba(255,255,255,0.055)" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
  <rect x="328" y="72" width="112" height="128" rx="22" fill="rgba(255,255,255,0.055)" stroke="rgba(255,255,255,0.08)" stroke-width="1" />

  <!-- Left column: 4 tasks from the top -->
  <rect x="88" y="92" width="80" height="28" rx="9" fill="url(#task)" />
  <rect x="88" y="128" width="80" height="28" rx="9" fill="url(#task)" />
  <rect x="88" y="164" width="80" height="28" rx="9" fill="url(#task)" />
  <rect x="88" y="200" width="80" height="28" rx="9" fill="url(#task)" />

  <!-- Middle column: 7 tasks (tallest lane) -->
  <rect x="216" y="92" width="80" height="28" rx="9" fill="url(#task-mid)" />
  <rect x="216" y="128" width="80" height="28" rx="9" fill="url(#task-mid)" />
  <rect x="216" y="164" width="80" height="28" rx="9" fill="url(#task-mid)" />
  <rect x="216" y="200" width="80" height="28" rx="9" fill="url(#task-mid)" />
  <rect x="216" y="236" width="80" height="28" rx="9" fill="url(#task-mid)" />
  <rect x="216" y="272" width="80" height="28" rx="9" fill="url(#task-mid)" />
  <rect x="216" y="308" width="80" height="28" rx="9" fill="url(#task-mid)" />

  <!-- Right column: 3 tasks -->
  <rect x="344" y="92" width="80" height="28" rx="9" fill="url(#task-deep)" />
  <rect x="344" y="128" width="80" height="28" rx="9" fill="url(#task-deep)" />
  <rect x="344" y="164" width="80" height="28" rx="9" fill="url(#task-deep)" />
</svg>
