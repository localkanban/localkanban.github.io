    if (!q) return true;
    const { tags, words } = parseQuery(q);
    const cardTagsLower = (card.tags || []).map(t => t.toLowerCase());

    // Tag filter respects state.tagFilterMode
    if (tags.length > 0) {
      if (state.tagFilterMode === 'any') {
        // at least one of the queried tags must be present
        const anyMatch = tags.some(t => cardTagsLower.includes(t));
        if (!anyMatch) return false;
      } else {
        // 'all' (default) — every queried tag must be present
        for (const t of tags) {
          if (!cardTagsLower.includes(t)) return false;
        }
      }
    }

    // Text words always AND together (typical search behavior)
    if (words.length > 0) {
      const hay = (card.text + ' ' + (card.description || '')).toLowerCase();
      for (const w of words) {
        if (!hay.includes(w)) return false;
      }
    }
    return true;
  }

  function toggleTagFilter(tag) {
    const tagLower = tag.toLowerCase();
    const { tags, words } = parseQuery(state.searchQuery);
    let newTags;
    if (tags.includes(tagLower)) {
      newTags = tags.filter(t => t !== tagLower);
    } else {
      newTags = [...tags, tagLower];
    }
    const newQuery = [...words, ...newTags.map(t => '#' + t)].join(' ');
    setSearchQuery(newQuery);
  }

  function setSearchQuery(q) {
    state.searchQuery = q || '';
    searchInput.value = state.searchQuery;
    searchWrap.classList.toggle('has-value', state.searchQuery.length > 0);
    updateTagModeToggleUI();
    saveState();
    renderRows();
  }

  const searchInput = document.getElementById('searchInput');
  const searchWrap = document.getElementById('searchWrap');
  const searchClear = document.getElementById('searchClear');
  const tagModeToggle = document.getElementById('tagModeToggle');

  function updateTagModeToggleUI() {
    if (!tagModeToggle) return;
    const n = parseQuery(state.searchQuery).tags.length;
    tagModeToggle.classList.toggle('dim', n < 2);
    tagModeToggle.querySelectorAll('button[data-mode]').forEach((b) => {
      b.classList.toggle('active', b.getAttribute('data-mode') === state.tagFilterMode);
    });
  }

  if (tagModeToggle) {
    tagModeToggle.querySelectorAll('button[data-mode]').forEach((btn) => {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        const mode = btn.getAttribute('data-mode');
        if (mode !== 'any' && mode !== 'all') return;
        state.tagFilterMode = mode;
        updateTagModeToggleUI();
        saveState();
        renderRows();
      });
    });
  }

  searchInput.addEventListener('input', () => {
    state.searchQuery = searchInput.value;
    searchWrap.classList.toggle('has-value', state.searchQuery.length > 0);
    updateTagModeToggleUI();
    saveState();
    renderRows();
  });
  searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      e.preventDefault();
      setSearchQuery('');
      searchInput.blur();
    }
  });
  searchClear.addEventListener('click', () => {
    setSearchQuery('');
    searchInput.focus();
  });

  const btnExport = document.getElementById('btnExport');
  const btnImport = document.getElementById('btnImport');
  const btnReset = document.getElementById('btnReset');
  const importFileInput = document.getElementById('importFileInput');
  if (btnExport) btnExport.addEventListener('click', () => exportBoardToFile());
  if (btnImport && importFileInput) {
    btnImport.addEventListener('click', () => importFileInput.click());
    importFileInput.addEventListener('change', () => {
      const file = importFileInput.files && importFileInput.files[0];
      importFileInput.value = '';
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const text = typeof reader.result === 'string' ? reader.result : '';
          const parsed = JSON.parse(text);
          appendFromImportPayload(parsed);
          saveState();
          renderAll();
        } catch (err) {
          window.alert(err instanceof Error ? err.message : 'Import failed.');
        }
      };
      reader.onerror = () => window.alert('Could not read the file.');
      reader.readAsText(file);
    });
  }
  if (btnReset) btnReset.addEventListener('click', () => openResetConfirmModal());

  // ============================================================
  // CONTEXT MENU
  // ============================================================
  const ctxMount = document.getElementById('ctxMount');

  function closeContextMenu() {
    ctxMount.innerHTML = '';
  }

  function openCardContextMenu(card, col, textEl, x, y) {
    closeContextMenu();
    closeModal();

    const menu = document.createElement('div');
    menu.className = 'ctx-menu';

    const items = [
      { label: 'Edit description', icon: '✎', onClick: () => startCardEdit(card, col, textEl) },
      { label: 'Edit details…',    icon: '☰', onClick: () => openCardDetailsModal(card) },
      { divider: true },
      { label: 'Demote to Unsorted…', icon: '↓', onClick: () => openDemoteConfirmModal(card) },
      { divider: true },
      { label: 'Delete card', icon: '×', danger: true, onClick: () => {
        const f = findCard(card.id);
        if (!f) return;
        f.col.cards.splice(f.idx, 1);
        saveState();
        renderRows();
      }}
    ];

    items.forEach(item => {
      if (item.divider) {
        const d = document.createElement('div');
        d.className = 'ctx-divider';
        menu.appendChild(d);
        return;
      }
      const btn = document.createElement('button');
      btn.className = 'ctx-item' + (item.danger ? ' danger' : '');
      btn.innerHTML = `<span style="width:14px;text-align:center;opacity:0.7;">${item.icon}</span><span>${item.label}</span>`;
      btn.addEventListener('click', () => {
        closeContextMenu();
        item.onClick();
      });
      menu.appendChild(btn);
    });

    ctxMount.appendChild(menu);

    // Position, keeping in viewport
    const rect = menu.getBoundingClientRect();
    const px = Math.min(x, window.innerWidth - rect.width - 8);
    const py = Math.min(y, window.innerHeight - rect.height - 8);
    menu.style.left = px + 'px';
    menu.style.top = py + 'px';

    // Dismiss on outside click / escape
    setTimeout(() => {
      const offClick = (e) => {
        if (!menu.contains(e.target)) {
          closeContextMenu();
          window.removeEventListener('mousedown', offClick, true);
          window.removeEventListener('keydown', offKey, true);
        }
      };
      const offKey = (e) => {
        if (e.key === 'Escape') {
          closeContextMenu();
          window.removeEventListener('mousedown', offClick, true);
          window.removeEventListener('keydown', offKey, true);
        }
      };
      window.addEventListener('mousedown', offClick, true);
      window.addEventListener('keydown', offKey, true);
    }, 0);
  }

  // ============================================================
  // CARD DETAILS MODAL
  // ============================================================
  const modalMount = document.getElementById('modalMount');

  function closeModal() {
    modalMount.innerHTML = '';
  }

  function openResetConfirmModal() {
    closeContextMenu();
    closeModal();

    const backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop';

    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.addEventListener('click', (e) => e.stopPropagation());
    modal.addEventListener('mousedown', (e) => e.stopPropagation());

    const header = document.createElement('div');
    header.className = 'modal-header';
    const title = document.createElement('h3');
    title.textContent = 'Reset board?';
    const closeBtn = document.createElement('button');
    closeBtn.className = 'btn-icon';
    closeBtn.innerHTML = '×';
    closeBtn.title = 'Close';
    closeBtn.addEventListener('click', () => closeModal());
    header.appendChild(title);
    header.appendChild(closeBtn);

    const body = document.createElement('div');
    body.className = 'modal-body';
    const p = document.createElement('p');
    p.style.margin = '0';
    p.style.fontSize = '14px';
    p.style.lineHeight = '1.55';
    p.style.color = 'var(--text)';
    p.textContent = 'This removes every row, column, card, and unsorted item, and clears the search filter. This cannot be undone.';
    body.appendChild(p);

    const footer = document.createElement('div');
    footer.className = 'modal-footer';
    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'btn';
    cancelBtn.textContent = 'Cancel';
    cancelBtn.addEventListener('click', () => closeModal());
    const resetBtn = document.createElement('button');
    resetBtn.className = 'btn btn-danger';
    resetBtn.textContent = 'Reset everything';
    resetBtn.addEventListener('click', () => {
      state.rows = [];
      state.unsortedItems = [];
      setSearchQuery('');
      _seq = 100;
      closeModal();
      saveState();
      renderAll();
    });
    footer.appendChild(cancelBtn);
    footer.appendChild(resetBtn);

    modal.appendChild(header);
    modal.appendChild(body);
    modal.appendChild(footer);
    backdrop.appendChild(modal);
    modalMount.appendChild(backdrop);

    backdrop.addEventListener('click', () => closeModal());
    const escHandler = (e) => {
      if (e.key === 'Escape') {
        closeModal();
        window.removeEventListener('keydown', escHandler);
      }
    };
    window.addEventListener('keydown', escHandler);
  }

  function openDemoteConfirmModal(card) {
    closeContextMenu();
    closeModal();

    const backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop';

    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.addEventListener('click', (e) => e.stopPropagation());
    modal.addEventListener('mousedown', (e) => e.stopPropagation());

    const header = document.createElement('div');
    header.className = 'modal-header';
    const title = document.createElement('h3');
    title.textContent = 'Demote to Unsorted?';
    const closeBtn = document.createElement('button');
    closeBtn.className = 'btn-icon';
    closeBtn.innerHTML = '×';
    closeBtn.title = 'Close';
    closeBtn.addEventListener('click', () => closeModal());
    header.appendChild(title);
    header.appendChild(closeBtn);

    const body = document.createElement('div');
    body.className = 'modal-body';
    const p = document.createElement('p');
    p.style.margin = '0';
    p.style.fontSize = '14px';
    p.style.lineHeight = '1.55';
    p.style.color = 'var(--text)';
    p.textContent = 'This turns the card into a line item in Unsorted Items with only its title text kept. The description, links, and tags will be permanently removed.';

    body.appendChild(p);

    const footer = document.createElement('div');
    footer.className = 'modal-footer';
    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'btn';
    cancelBtn.textContent = 'Cancel';
    cancelBtn.addEventListener('click', () => closeModal());
    const demoteBtn = document.createElement('button');
    demoteBtn.className = 'btn btn-danger';
    demoteBtn.textContent = 'Demote';
    demoteBtn.addEventListener('click', () => {
      const f = findCard(card.id);
      if (!f) {
        closeModal();
        return;
      }
      f.col.cards.splice(f.idx, 1);
      state.unsortedItems.push({ id: uid('u'), text: card.text, done: false });
      closeModal();
      saveState();
      renderAll();
    });
    footer.appendChild(cancelBtn);
    footer.appendChild(demoteBtn);

    modal.appendChild(header);
    modal.appendChild(body);
    modal.appendChild(footer);
    backdrop.appendChild(modal);
    modalMount.appendChild(backdrop);

    backdrop.addEventListener('click', () => closeModal());
    const escHandler = (e) => {
      if (e.key === 'Escape') {
        closeModal();
        window.removeEventListener('keydown', escHandler);
      }
    };
    window.addEventListener('keydown', escHandler);
  }

  function openCardDetailsModal(card) {
    closeContextMenu();
    closeModal();

    // Local working copy so cancel is non-destructive
    function dedupeTagsCaseInsensitive(tags) {
      const seen = new Set();
      const out = [];
      for (const raw of tags) {
        const t = String(raw || '').trim().replace(/^#/, '');
        if (!t) continue;
        const k = t.toLowerCase();
        if (seen.has(k)) continue;
        seen.add(k);
        out.push(t);
      }
      return out;
    }

    const draft = {
      description: card.description || '',
      links: (card.links || []).map(l => ({ ...l })),
      tags: dedupeTagsCaseInsensitive(card.tags || [])
    };

    const backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop';

    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.addEventListener('click', (e) => e.stopPropagation());
    modal.addEventListener('mousedown', (e) => e.stopPropagation());

    // Header
    const header = document.createElement('div');
    header.className = 'modal-header';
    const title = document.createElement('h3');
    title.textContent = card.text ? `Details · ${card.text.length > 60 ? card.text.slice(0,60) + '…' : card.text}` : 'Card details';
    const closeBtn = document.createElement('button');
    closeBtn.className = 'btn-icon';
    closeBtn.innerHTML = '×';
    closeBtn.title = 'Close';
    closeBtn.addEventListener('click', () => closeModal());
    header.appendChild(title);
    header.appendChild(closeBtn);

    // Body
    const body = document.createElement('div');
    body.className = 'modal-body';

    // -- Description
    const descField = document.createElement('div');
    descField.className = 'modal-field';
    const descLabel = document.createElement('label');
    descLabel.textContent = 'Description';
    const descTa = document.createElement('textarea');
    descTa.className = 'modal-textarea';
    descTa.placeholder = 'Add an extended description…';
    descTa.value = draft.description;
    descTa.addEventListener('input', () => { draft.description = descTa.value; });
    descField.appendChild(descLabel);
    descField.appendChild(descTa);
    body.appendChild(descField);

    // -- Links
    const linksField = document.createElement('div');
    linksField.className = 'modal-field';
    const linksLabel = document.createElement('label');
    linksLabel.textContent = 'Links';
    const linkRows = document.createElement('div');
    linkRows.className = 'link-rows';

    function rebuildLinkRows() {
      linkRows.innerHTML = '';
      draft.links.forEach((link, i) => {
        const row = document.createElement('div');
        row.className = 'link-row';

        const nameInput = document.createElement('input');
        nameInput.type = 'text';
        nameInput.className = 'modal-input link-name';
        nameInput.placeholder = 'Name';
        nameInput.value = link.name || '';
        nameInput.addEventListener('input', () => { draft.links[i].name = nameInput.value; });

        const urlInput = document.createElement('input');
        urlInput.type = 'text';
        urlInput.className = 'modal-input';
        urlInput.placeholder = 'https://…';
        urlInput.value = link.url || '';
        urlInput.addEventListener('input', () => { draft.links[i].url = urlInput.value; });

        const removeBtn = document.createElement('button');
        removeBtn.className = 'btn-icon';
        removeBtn.innerHTML = '×';
        removeBtn.title = 'Remove link';
        removeBtn.addEventListener('click', () => {
          draft.links.splice(i, 1);
          rebuildLinkRows();
        });

        row.appendChild(nameInput);
        row.appendChild(urlInput);
        row.appendChild(removeBtn);
        linkRows.appendChild(row);
      });
    }
    rebuildLinkRows();

    const addLinkBtn = document.createElement('button');
    addLinkBtn.className = 'add-row-btn';
    addLinkBtn.textContent = '+ Add link';
    addLinkBtn.addEventListener('click', () => {
      draft.links.push({ name: '', url: '' });
      rebuildLinkRows();
      // focus the new name input
      requestAnimationFrame(() => {
        const inputs = linkRows.querySelectorAll('input.link-name');
        inputs[inputs.length - 1]?.focus();
      });
    });

    linksField.appendChild(linksLabel);
    linksField.appendChild(linkRows);
    linksField.appendChild(addLinkBtn);
    body.appendChild(linksField);

    // -- Tags
    const tagsField = document.createElement('div');
    tagsField.className = 'modal-field';
    const tagsLabel = document.createElement('label');
    tagsLabel.textContent = 'Tags';
    const chipsBox = document.createElement('div');
    chipsBox.className = 'tag-chips';

    const tagInput = document.createElement('input');
    tagInput.type = 'text';
    tagInput.className = 'tag-input';
    tagInput.placeholder = 'Type tags; space starts a new tag';
    tagInput.spellcheck = false;

    function rebuildChips() {
      // Remove all existing chips, leave the input as last child
      [...chipsBox.querySelectorAll('.tag-chip')].forEach(c => c.remove());
      draft.tags.forEach((tag, i) => {
        const chip = document.createElement('span');
        chip.className = 'tag-chip';
        applyTagColorsToElement(chip, tag);
        chip.appendChild(document.createTextNode('#' + tag));
        const x = document.createElement('button');
        x.className = 'tag-chip-x';
        x.innerHTML = '×';
        x.title = 'Remove tag';
        x.addEventListener('click', () => {
          draft.tags.splice(i, 1);
          rebuildChips();
        });
        chip.appendChild(x);
        chipsBox.insertBefore(chip, tagInput);
      });
    }

    function addTagTokens(tokenStrings) {
      const toAdd = tokenStrings
        .map((t) => String(t || '').trim().replace(/^#/, ''))
        .filter(Boolean);
      if (!toAdd.length) return;
      draft.tags.push(...toAdd);
      draft.tags = dedupeTagsCaseInsensitive(draft.tags);
      rebuildChips();
    }

    function commitTagFromInput() {
      const raw = tagInput.value.trim();
      if (!raw) return;
      addTagTokens(raw.split(/[\s,]+/));
      tagInput.value = '';
    }

    tagInput.addEventListener('keydown', (e) => {
      if (e.key === ' ' || e.code === 'Space') {
        e.preventDefault();
        const v = tagInput.value;
        const sel = tagInput.selectionStart ?? v.length;
        const left = v.slice(0, sel);
        const after = v.slice(sel);
        let i = left.length;
        while (i > 0 && /\s/.test(left[i - 1])) i--;
        let j = i;
        while (j > 0 && !/\s/.test(left[j - 1])) j--;
        const word = left.slice(j, i).trim().replace(/^#/, '');
        const before = left.slice(0, j);
        if (word) addTagTokens([word]);
        tagInput.value = before + after;
        requestAnimationFrame(() => {
          const pos = before.length;
          tagInput.setSelectionRange(pos, pos);
        });
      } else if (e.key === ',') {
        e.preventDefault();
        commitTagFromInput();
      } else if (e.key === 'Backspace' && tagInput.value === '' && draft.tags.length > 0) {
        e.preventDefault();
        draft.tags.pop();
        rebuildChips();
      }
    });
    tagInput.addEventListener('blur', () => {
      // commit any partial input on blur (but not when clicking save/cancel)
      if (tagInput.value.trim()) commitTagFromInput();
    });

    chipsBox.appendChild(tagInput);
    rebuildChips();

    chipsBox.addEventListener('click', () => tagInput.focus());

    tagsField.appendChild(tagsLabel);
    tagsField.appendChild(chipsBox);
    body.appendChild(tagsField);

    // Footer
    const footer = document.createElement('div');
    footer.className = 'modal-footer';
    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'btn';
    cancelBtn.textContent = 'Cancel';
    cancelBtn.addEventListener('click', () => closeModal());
    const saveBtn = document.createElement('button');
    saveBtn.className = 'btn btn-primary';
    saveBtn.textContent = 'Save';
    saveBtn.addEventListener('click', () => {
      // commit any pending tag input
      if (tagInput.value.trim()) commitTagFromInput();
      // Apply draft to live card
      const f = findCard(card.id);
      if (f) {
        const c = f.col.cards[f.idx];
        c.description = draft.description.trim();
        c.links = draft.links
          .map(l => ({ name: (l.name || '').trim(), url: (l.url || '').trim() }))
          .filter(l => l.url !== '')
          .map(l => ({ name: l.name || l.url, url: l.url }));
        c.tags = dedupeTagsCaseInsensitive(draft.tags.map((t) => t.trim()).filter(Boolean));
      }
      saveState();
      renderRows();
      closeModal();
    });
    footer.appendChild(cancelBtn);
    footer.appendChild(saveBtn);

    modal.appendChild(header);
    modal.appendChild(body);
    modal.appendChild(footer);
    backdrop.appendChild(modal);
    modalMount.appendChild(backdrop);

    // Backdrop click closes; escape closes
    backdrop.addEventListener('click', () => closeModal());
    const escHandler = (e) => {
      if (e.key === 'Escape') {
        closeModal();
        window.removeEventListener('keydown', escHandler);
      }
    };
    window.addEventListener('keydown', escHandler);

    // Focus first field
    requestAnimationFrame(() => descTa.focus());
  }

  // ============================================================
  // PANEL DRAG-RESIZE / OPEN / CLOSE
  // ============================================================
  const panelResize = document.getElementById('panelResize');
  const PANEL_MIN = 400;
  const PANEL_MAX = 600;
  const SNAP_CLOSE = 120;
  const COLLAPSED_W = 36;
  const PANEL_DRAG_THRESHOLD = 6; // px movement before treating as resize drag (below = click toggle)

  function applyPanelState() {
    sidePanel.classList.toggle('collapsed', !!state.panelCollapsed);
    if (!state.panelCollapsed) {
      const w = Math.max(PANEL_MIN, Math.min(PANEL_MAX, state.panelWidth || PANEL_MIN));
      sidePanel.style.width = w + 'px';
      sidePanel.style.flexBasis = w + 'px';
    } else {
      sidePanel.style.width = '';
      sidePanel.style.flexBasis = '';
    }
  }

  let resizeState = null; // { startX, startY, startWidth, tentative }
  panelResize.addEventListener('mousedown', (e) => {
    e.preventDefault();
    e.stopPropagation();
    resizeState = {
      startX: e.clientX,
      startY: e.clientY,
      startWidth: state.panelCollapsed ? COLLAPSED_W : sidePanel.getBoundingClientRect().width,
      tentative: true
    };
  });
  window.addEventListener('mousemove', (e) => {
    if (!resizeState) return;
    if (resizeState.tentative) {
      const dx = e.clientX - resizeState.startX;
      const dy = e.clientY - resizeState.startY;
      if (Math.abs(dx) + Math.abs(dy) < PANEL_DRAG_THRESHOLD) return;
      resizeState.tentative = false;
      panelResize.classList.add('active');
      document.body.classList.add('resizing-panel');
    }
    e.preventDefault();
    const raw = resizeState.startWidth - (e.clientX - resizeState.startX);
    if (raw < SNAP_CLOSE) {
      if (!sidePanel.classList.contains('collapsed')) {
        sidePanel.classList.add('collapsed');
        sidePanel.style.width = '';
        sidePanel.style.flexBasis = '';
      }
    } else {
      const w = Math.max(PANEL_MIN, Math.min(PANEL_MAX, raw));
      sidePanel.classList.remove('collapsed');
      sidePanel.style.width = w + 'px';
      sidePanel.style.flexBasis = w + 'px';
    }
  });
  window.addEventListener('mouseup', (e) => {
    if (!resizeState) return;
    if (resizeState.tentative) {
      state.panelCollapsed = !state.panelCollapsed;
      if (!state.panelCollapsed) {
        state.panelWidth = Math.max(PANEL_MIN, Math.min(PANEL_MAX, state.panelWidth || PANEL_MIN));
      }
      resizeState = null;
      applyPanelState();
      saveState();
      return;
    }
    const finalRaw = resizeState.startWidth - (e.clientX - resizeState.startX);
    if (finalRaw < SNAP_CLOSE) {
      state.panelCollapsed = true;
    } else {
      state.panelCollapsed = false;
      state.panelWidth = Math.max(PANEL_MIN, Math.min(PANEL_MAX, finalRaw));
    }
    resizeState = null;
    panelResize.classList.remove('active');
    document.body.classList.remove('resizing-panel');
    applyPanelState();
    saveState();
  });

  // ============================================================
  // INIT
  // ============================================================
  applyPanelState();
  // Restore search input from state
  searchInput.value = state.searchQuery || '';
  searchWrap.classList.toggle('has-value', (state.searchQuery || '').length > 0);
  if (state.tagFilterMode !== 'any' && state.tagFilterMode !== 'all') state.tagFilterMode = 'all';
  updateTagModeToggleUI();
  renderAll();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js').catch((err) => {
      console.warn('Service worker registration failed:', err);
    });
  });
}
</script>
